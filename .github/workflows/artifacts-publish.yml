name: Publish Artifacts to Agent Registry

on:
  push:
    branches:
      - main
    paths:
      - "artifacts/**"

env:
  REGISTRY: ghcr.io
  ORG: alchemesh-io

jobs:
  publish-servers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        server:
          - name: jarvis
            path: artifacts/servers/jarvis
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "version=$(yq -r '.version' ${{ matrix.server.path }}/mcp.yaml)" >> "$GITHUB_OUTPUT"

      - name: Install arctl
        run: curl -fsSL https://raw.githubusercontent.com/agentregistry-dev/agentregistry/main/scripts/get-arctl | bash

      - name: Build and push
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.server.name }}
          arctl mcp build ${{ matrix.server.path }} --image ${IMAGE}:${{ steps.meta.outputs.version }} --push
          arctl mcp build ${{ matrix.server.path }} --image ${IMAGE}:latest --push

  publish-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        skill:
          - name: planner-daily-wrap-up
            path: artifacts/skills/planner__daily_wrap_up
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Dockerfile
        id: check
        run: |
          if [ -f "${{ matrix.skill.path }}/Dockerfile" ]; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from SKILL.md
        id: meta
        if: steps.check.outputs.has_dockerfile == 'true'
        run: |
          VERSION=$(grep -m1 '^version:' ${{ matrix.skill.path }}/SKILL.md | sed 's/^version:[[:space:]]*//' || echo "latest")
          if [ -z "$VERSION" ]; then VERSION="latest"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install arctl
        if: steps.check.outputs.has_dockerfile == 'true'
        run: curl -fsSL https://raw.githubusercontent.com/agentregistry-dev/agentregistry/main/scripts/get-arctl | bash

      - name: Build and push
        if: steps.check.outputs.has_dockerfile == 'true'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.skill.name }}
          arctl skill build ${{ matrix.skill.path }} --image ${IMAGE}:${{ steps.meta.outputs.version }} --push
          arctl skill build ${{ matrix.skill.path }} --image ${IMAGE}:latest --push
