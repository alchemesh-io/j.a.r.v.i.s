name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  ORG: alchemesh-io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short git SHA
        id: meta
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/jarvis-backend:${{ steps.meta.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/jarvis-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/jarvis-frontend:${{ steps.meta.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/jarvis-frontend:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/jarvis-worker:${{ steps.meta.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/jarvis-worker:latest
