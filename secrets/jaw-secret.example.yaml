# J.A.W — Worker Secrets
#
# Copy this file to jaw-secret.yaml and fill in the values.
# jaw-secret.yaml is gitignored and deployed via `make deploy` / `make deploy-local`.
#
# All values must be base64-encoded. Encode with:
#   echo -n "my-value" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: jarvis-jaw-secret
  namespace: jarvis
  labels:
    app: jarvis-worker
type: Opaque
data:
  # --- Claude Code (provide one of the two) ---
  # Anthropic API key for Claude Code sessions in worker pods
  # ANTHROPIC_API_KEY: ""
  # OAuth token for Claude Code (alternative to API key)
  # CLAUDE_CODE_OAUTH_TOKEN: ""

  # --- Git ---
  # GitHub personal access token for cloning private repositories
  # GITHUB_TOKEN: ""
