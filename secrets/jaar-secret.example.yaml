# J.A.A.R — Agent Registry Secrets
#
# Copy this file to jaar-secret.yaml and fill in the values.
# jaar-secret.yaml is gitignored and applied via `make deploy` / `make deploy-local`.
#
# All values must be base64-encoded. Encode with:
#   echo -n "my-value" | base64
#
# Generate a hex JWT key with:
#   openssl rand -hex 32 | tr -d '\n' | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: jaar-secret
  namespace: jaar
  labels:
    app: jaar
type: Opaque
data:
  # --- JWT signing key (required) ---
  # Hex-encoded HMAC key for signing JWT tokens
  AGENT_REGISTRY_JWT_PRIVATE_KEY: ""

  # --- External database URL (used when database.postgres.bundled.enabled=false) ---
  # Example: postgresql://user:pass@cloudsql-proxy:5432/agentregistry?sslmode=disable
  # AGENT_REGISTRY_DATABASE_URL: ""
