# J.A.R.V.I.S — Backend Secrets
#
# Copy this file to backend-secret.yaml and fill in the values.
# backend-secret.yaml is gitignored and deployed via ArgoCD.
#
# All values must be base64-encoded. Encode with:
#   echo -n "my-value" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: jarvis-backend-secret
  namespace: jarvis
  labels:
    app: jarvis-backend
type: Opaque
data:
  # --- JIRA Integration ---
  # JIRA_API_KEY: ""

  # --- Google Calendar Integration ---
  # GOOGLE_PROJECT_ID: ""
  # GOOGLE_CLIENT_ID: ""
  # GOOGLE_CLIENT_SECRET: ""
  # GOOGLE_AUTH_URI: ""
  # GOOGLE_TOKEN_URI: ""
  # GOOGLE_AUTH_PROVIDER_X509_CERT_URL: ""
