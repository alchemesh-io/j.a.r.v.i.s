apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: jarvis-gateway
  namespace: istio-system
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      hostname: "*.jarvis.io"
      allowedRoutes:
        namespaces:
          from: All
