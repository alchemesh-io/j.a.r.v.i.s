apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-worker-manager
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-backend
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-backend
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-worker-manager
  apiGroup: rbac.authorization.k8s.io
