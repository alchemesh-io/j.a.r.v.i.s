apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-routes
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.gateway.host | default "main.jarvis.io" }}
  rules:
    # Backend API
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}
    # OpenAPI docs
    - matches:
        - path:
            type: PathPrefix
            value: /docs
      backendRefs:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}
    - matches:
        - path:
            type: Exact
            value: /openapi.json
      backendRefs:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}
    # Health check
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}
    # Frontend SPA (catch-all)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-frontend
          port: {{ .Values.frontend.service.port }}
