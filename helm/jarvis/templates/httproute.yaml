apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-routes
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  rules:
    # Root redirect: / -> /jarvis
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /jarvis
            statusCode: 302
    # Backend API: /jarvis/api/* -> /api/*
    - matches:
        - path:
            type: PathPrefix
            value: /jarvis/api/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/
      backendRefs:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}
    # OpenAPI docs: /jarvis/docs -> /docs
    - matches:
        - path:
            type: PathPrefix
            value: /jarvis/docs
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /docs
      backendRefs:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}
    # OpenAPI spec: /jarvis/openapi.json -> /openapi.json
    - matches:
        - path:
            type: Exact
            value: /jarvis/openapi.json
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /openapi.json
      backendRefs:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}
    # Health check: /jarvis/health -> /health
    - matches:
        - path:
            type: Exact
            value: /jarvis/health
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /health
      backendRefs:
        - name: {{ .Release.Name }}-backend
          port: {{ .Values.backend.service.port }}
    # Frontend SPA: /jarvis/* -> /*
    - matches:
        - path:
            type: PathPrefix
            value: /jarvis
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ .Release.Name }}-frontend
          port: {{ .Values.frontend.service.port }}
