apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-backend-config
            - secretRef:
                name: {{ .Release.Name }}-backend-secret
                optional: true
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
            {{- if .Values.backend.config.googleServiceAccountKeyPath }}
            - name: google-sa-key
              mountPath: /etc/google
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources: {{ toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-sqlite
        {{- if .Values.backend.config.googleServiceAccountKeyPath }}
        - name: google-sa-key
          secret:
            secretName: {{ .Release.Name }}-google-sa-key
        {{- end }}
