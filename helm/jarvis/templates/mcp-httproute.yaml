apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-mcp-routes
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-mcp
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.gateway.mcpHost | default "mcp.jarvis.io" }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Release.Name }}-mcp
          port: {{ .Values.mcp.service.port }}
