apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-mcp
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-mcp
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-mcp
    spec:
      containers:
        - name: mcp
          image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          args: ["python", "src/main.py", "--transport", "http", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_URL
              value: {{ .Values.mcp.backendUrl | default (printf "http://%s-backend:%d" .Release.Name (.Values.backend.service.port | int)) | quote }}
          resources: {{ toYaml .Values.mcp.resources | nindent 12 }}
