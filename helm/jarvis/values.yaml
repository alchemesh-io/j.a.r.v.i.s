# Default values for jarvis chart.

backend:
  image:
    repository: ghcr.io/alchemesh-io/jarvis-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 8000
  resources: {}
  config:
    databaseUrl: "sqlite:////data/jarvis.db"
    appTitle: "J.A.R.V.I.S"
    debug: "false"
    # JIRA integration (optional)
    jiraProjectUrl: ""
    jiraUserEmail: ""
    jiraJql: ""
    # Google Calendar integration (optional)
    googleAuthMode: ""          # "oauth2" or "service_account"
    googleClientId: ""
    googleRedirectUri: ""
    googleServiceAccountKeyPath: ""
    googleDelegatedUserEmail: ""
  secrets: {}
  # Secrets are created from .env via `make deploy` / `make deploy-local`.
  # See .env.example for available variables (JIRA_API_KEY, GOOGLE_CLIENT_SECRET, etc.).

frontend:
  image:
    repository: ghcr.io/alchemesh-io/jarvis-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 80
  resources: {}

mcp:
  image:
    repository: ghcr.io/alchemesh-io/jarvis-mcp
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  backendUrl: ""
  resources: {}

gateway:
  name: jarvis-gateway
  namespace: istio-system

persistence:
  storageClass: standard
  size: 1Gi
