# Default values for jarvis chart.

backend:
  image:
    repository: ghcr.io/alchemesh-io/jarvis-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 8000
  resources: {}
  config:
    databaseUrl: "sqlite:////data/jarvis.db"
    appTitle: "J.A.R.V.I.S"
    debug: "false"
    # JIRA integration (optional)
    jiraProjectUrl: "https://sage-project.atlassian.net"
    jiraUserEmail: "guittonbouedronalexandre@gmail.com"
    jiraJql: "(project = AG) OR (project IN (SAGE, JARVIS) AND assignee = 712020:4c783354-372e-4dbd-abb8-f3a2eb2cf58f)"
    # Google Calendar integration (optional)
    googleAuthMode: "oauth2"          # "oauth2" or "service_account"
    googleRedirectUri: "http://localhost/api/v1/gcal/auth/callback"
    googleCalendarEmail: "alexandre.guitton@doctolib.com"
    googleServiceAccountKeyPath: ""
    googleDelegatedUserEmail: ""
  secrets: {}
  # Secrets are created from .env via `make deploy` / `make deploy-local`.
  # See .env.example for available variables (JIRA_API_KEY, GOOGLE_CLIENT_SECRET, etc.).

frontend:
  image:
    repository: ghcr.io/alchemesh-io/jarvis-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 80
  resources: {}

mcp:
  image:
    repository: ghcr.io/alchemesh-io/jarvis
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  backendUrl: ""
  resources: {}

worker:
  image:
    repository: ghcr.io/alchemesh-io/jarvis-worker
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  claudeConfig:
    enabled: false
    policyLimits: ""
    remoteSettings: ""
    claudeJson: ""
    settings: ""

gateway:
  name: jarvis-gateway
  namespace: istio-system
  host: main.jarvis.io
  mcpHost: mcp.jarvis.io

persistence:
  storageClass: standard
  size: 1Gi
  # Set hostPath to persist data on the host across cluster rebuilds.
  # Maps to minikube mount: .data/jarvis -> /mnt/jarvis-data/jarvis
  hostPath: ""
